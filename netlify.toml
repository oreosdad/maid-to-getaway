[build]
  publish = "."
  functions = "netlify/functions"

# Disable post-processing that rewrites email links and can corrupt JS
[build.processing]
  skip_processing = true

# Tell Netlify not to block deploys for these env var values
# ICAL_SYNC_SECRET is used as an internal API auth token in frontend code
[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "ICAL_SYNC_SECRET"

# Run iCal sync every 12 hours (6am and 6pm UTC = 1am and 1pm CST)
[[scheduled-functions]]
  name = "sync-ical"
  cron = "0 6,18 * * *"

# Send weekly P&L every Friday at 8am CST (2pm UTC)
[[scheduled-functions]]
  name = "weekly-pl-email"
  cron = "0 14 * * 5"

# Redirect www to apex
[[redirects]]
  from = "https://www.maidtogetaway.com/*"
  to   = "https://maidtogetaway.com/:splat"
  status = 301
  force = true
