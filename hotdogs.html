<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🌭 HOT DOG COUNTER</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #001F3F;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    
    .container {
      text-align: center;
      background: #F5F0E8;
      padding: 60px 40px;
      border: 8px solid #001F3F;
    }
    
    .label {
      font-size: 24px;
      font-weight: bold;
      color: #E63946;
      margin-bottom: 30px;
      letter-spacing: 2px;
    }
    
    .counter {
      font-size: 200px;
      font-weight: bold;
      color: #001F3F;
      font-family: 'Courier New', monospace;
      margin: 20px 0;
      line-height: 1;
      text-shadow: 4px 4px 0px #F4A261;
    }
    
    .button {
      font-size: 32px;
      padding: 30px 60px;
      background: #E63946;
      color: white;
      border: 4px solid #001F3F;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 2px;
      margin-top: 40px;
      transition: all 0.1s;
    }
    
    .button:hover {
      background: #F4A261;
      color: #001F3F;
      transform: translate(-3px, -3px);
      box-shadow: 3px 3px 0px #001F3F;
    }
    
    .button:active {
      transform: translate(0, 0);
    }
  </style>
</head>
<body>

<div class="container">
  <div class="label">🌭 HOT DOGS 🌭</div>
  <div class="counter" id="count">0</div>
  <button class="button" onclick="addDog()">+1 DOG</button>
</div>

<script>
  let count = 0;
  
  function addDog() {
    count = count + 1;
    document.getElementById('count').textContent = count;
  }
</script>

</body>
</html>
