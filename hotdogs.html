  function rateComedy(comment) {
  window.rateComedy = function(comment) {
    if (!comment || comment.trim().length === 0) return null;
    let score = 25;
    const text = comment.toLowerCase();

    const painWords = ['die', 'dying', 'regret', 'hate', 'hell', 'worst', 'kill', 'sick', 'full', 'cry', 'suffer', 'destroy', 'mad', 'lose'];
    const funnyWords = ['glizzy', 'wiener', 'hotdog', 'dog', 'lol', 'haha', 'literally', 'absolutely', 'completely'];
    const selfDeprecating = ['i\'m', 'im ', 'stupid', 'dumb', 'idiot', 'why did', 'what was i', 'never again'];

    painWords.forEach(word => { if (text.includes(word)) score += 8; });
    funnyWords.forEach(word => { if (text.includes(word)) score += 6; });
    selfDeprecating.forEach(word => { if (text.includes(word)) score += 10; });

    const exclamationCount = (comment.match(/!/g) || []).length;
    score += exclamationCount * 3;

    const questionMarks = (comment.match(/\?/g) || []).length;
    score += questionMarks * 2;

    const capsWords = (comment.match(/\b[A-Z]{2,}\b/g) || []).length;
    score += capsWords * 5;

    if (comment.length > 50) score += 10;
    if (comment.length > 100) score += 15;
    if (comment.includes('...')) score += 8;

    const emojiRegex = /(\ud83c[\ud000-\udfff]|\ud83d[\ud000-\udfff]|\ud83e[\ud000-\udfff])/g;
    const emojiCount = (comment.match(emojiRegex) || []).length;
    score += emojiCount * 4;

    return Math.min(100, Math.max(1, Math.round(score)));
  }

  window.updateCountdown = function() {
    const endTime = new Date('2026-07-04T23:59:59').getTime();
    const now = new Date().getTime();
    const diff = endTime - now;

    if (diff <= 0) {
      document.getElementById('countdown').textContent = '00:00:00';
      document.body.innerHTML = '<div style="min-height:100vh;background:var(--navy);display:flex;align-items:center;justify-content:center;"><div style="text-align:center;color:var(--red);"><div style="font-size:72px;letter-spacing:4px;font-weight:bold;margin-bottom:20px;">🌭 CHALLENGE COMPLETE 🌭</div><div style="font-size:28px;letter-spacing:2px;">THIS TAB HAS SELF-DESTRUCTED</div></div></div>';
      return;
    }

    const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((diff % (1000 * 60)) / 1000);

    document.getElementById('countdown').textContent = 
      `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
